<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>{% block title %}Onedocs{% endblock %}</title>
  <style>
    /* Design tokens lifted verbatim from karararama-frontend globals.css so
       this server-rendered shell matches the React app's visual language
       (light theme only — these pages are short OAuth flows). */
    :root {
      --background:           oklch(1 0 0);
      --foreground:           oklch(0.18 0 0);
      --muted:                oklch(0.95 0 0);
      --muted-foreground:     oklch(0.45 0 0);
      --border:               oklch(0.88 0 0);
      --primary:              oklch(0.26 0.008 260);
      --primary-foreground:   oklch(0.98 0 0);
      --destructive:          oklch(0.5 0.2 25);
      --destructive-foreground: oklch(0.98 0 0);
      --success:              oklch(0.45 0.12 145);
      --success-foreground:   oklch(0.98 0 0);
      --radius-xl: 0.75rem;
      --radius-lg: 0.5rem;
      --radius-md: 0.375rem;
      --shadow-card: 0 2px 16px rgba(0, 0, 0, 0.06);
      --font-sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: color-mix(in oklch, var(--muted) 20%, var(--background));
      color: var(--foreground);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .page {
      min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 16px;
    }
    .card {
      width: 100%; max-width: 400px;
      background: var(--background);
      border: 1px solid color-mix(in oklch, var(--border) 40%, transparent);
      border-radius: var(--radius-xl);
      padding: 32px;
      box-shadow: var(--shadow-card);
    }
    @media (min-width: 640px) { .card { padding: 40px; } }
    .logo-wrap {
      display: flex; justify-content: center;
      margin-bottom: 32px;
    }
    .logo {
      width: 36px; height: 36px;
      object-fit: contain;
    }
    .title-block {
      text-align: center;
      margin-bottom: 28px;
    }
    h1, h2 {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--foreground);
    }
    .subtitle {
      font-size: 13px;
      color: var(--muted-foreground);
      margin-top: 6px;
    }
    form { display: flex; flex-direction: column; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .label {
      font-size: 13px;
      font-weight: 500;
      color: var(--foreground);
    }
    input[type="email"], input[type="password"], input[type="text"] {
      height: 40px;
      width: 100%;
      padding: 0 12px;
      font-size: 14px;
      color: var(--foreground);
      background: var(--background);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="email"]:focus,
    input[type="password"]:focus,
    input[type="text"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px color-mix(in oklch, var(--primary) 12%, transparent);
    }
    .btn {
      display: inline-flex;
      align-items: center; justify-content: center;
      height: 40px;
      padding: 0 16px;
      font-size: 13px;
      font-weight: 500;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s, background 0.15s;
      border: 1px solid transparent;
    }
    .btn-primary {
      background: var(--primary);
      color: var(--primary-foreground);
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary {
      background: var(--background);
      color: var(--foreground);
      border-color: var(--border);
    }
    .btn-secondary:hover {
      background: color-mix(in oklch, var(--muted) 60%, var(--background));
    }
    .btn-full { width: 100%; }
    .alert-error {
      background: color-mix(in oklch, var(--destructive) 10%, transparent);
      color: var(--destructive);
      border: 1px solid color-mix(in oklch, var(--destructive) 20%, transparent);
      font-size: 13px;
      padding: 12px;
      border-radius: var(--radius-lg);
    }
    .scope-list {
      list-style: none; padding: 0; margin: 16px 0 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .scope-list li {
      padding: 14px 16px;
      display: flex; align-items: flex-start; gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .scope-list li:last-child { border-bottom: 0; }
    .scope-check {
      flex-shrink: 0;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--primary);
      color: var(--primary-foreground);
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 11px;
      margin-top: 1px;
    }
    .scope-text .label-row {
      font-size: 13px; font-weight: 500; color: var(--foreground);
    }
    .scope-text .desc {
      font-size: 12px; color: var(--muted-foreground); margin-top: 2px;
    }
    .meta {
      font-size: 12px;
      color: var(--muted-foreground);
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .meta strong { color: var(--foreground); font-weight: 500; }
    .footer-copy {
      margin-top: 24px;
      font-size: 11px;
      color: color-mix(in oklch, var(--muted-foreground) 60%, transparent);
    }
    .actions-row { display: flex; flex-direction: column; gap: 8px; }
    a { color: var(--foreground); }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="logo-wrap">
        {# Inline-rendered logo: avoids cross-origin asset fetch on the OAuth
           page. Replace this with an <img> when we publish a CDN-hosted SVG. #}
        <svg class="logo" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"
             aria-label="Onedocs">
          <rect x="0" y="0" width="36" height="36" rx="8" fill="oklch(0.18 0 0)"/>
          <text x="18" y="23" text-anchor="middle"
                font-family="ui-sans-serif, system-ui, sans-serif"
                font-size="18" font-weight="700" fill="white">o</text>
        </svg>
      </div>
      {% block content %}{% endblock %}
    </div>
    <p class="footer-copy">© 2026 Onedocs. Tüm hakları saklıdır.</p>
  </div>
</body>
</html>
