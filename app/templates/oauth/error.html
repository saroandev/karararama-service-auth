{% extends "oauth/_layout.html" %}
{% block title %}Onedocs · Hata{% endblock %}
{% block content %}
  <div class="title-block">
    <h2>İstek tamamlanamadı</h2>
  </div>
  <div class="alert-error">
    <strong>{{ error }}</strong>
    {% if error_description %}<br>{{ error_description }}{% endif %}
  </div>
  <p class="meta" style="text-align:center; padding-top: 16px;">
    Lütfen bağlandığınız uygulamadan tekrar deneyin.
  </p>
{% endblock %}
